name: Handle database update dispatch

on:
  repository_dispatch:
    types:
      - poll-db

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: nodeversion
        run: echo "NODE=$(cat .nvmrc)" >> $GITHUB_OUTPUT
      - name: Use Node.js ${{steps.nodeversion.outputs.NODE}}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ steps.nodeversion.outputs.NODE }}
      - name: Trigger rebuild
        run: |
          git config --global user.name 'Keycap Asciivist Bot'
          git config --global user.email 'sillypears[bot]@users.noreply.github.com'
          git commit --allow-empty -m "Trigger rebuild" || true
          git push -f || true
